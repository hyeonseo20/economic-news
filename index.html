<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한경 모닝루틴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0D1117;
      color: #e6edf3;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* 헤더 */
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #00C896;
      margin-bottom: 5px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #e6edf3;
    }

    .header-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #8b949e;
      margin-top: 3px;
    }

    .date-btn {
      border: 1px solid #00C896;
      background: transparent;
      color: #00C896;
      padding: 6px 10px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    .date-btn:hover { background: rgba(0,200,150,0.1); }

    /* 탭 메뉴 */
    .tab-bar {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      position: sticky;
      top: 73px;
      z-index: 99;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: #8b949e;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }

    .tab:hover { color: #c9d1d9; }

    .tab.active {
      color: #00C896;
      border-bottom: 2px solid #00C896;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 썸네일 */
    .thumbnail {
      display: block;
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      text-decoration: none;
    }

    .thumbnail-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(0,0,0,0.35);
    }

    .play-btn {
      width: 44px;
      height: 44px;
      border: 2px solid #00C896;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 16px solid #00C896;
      margin-left: 3px;
    }

    /* 뉴스 카운트 바 */
    .news-count-bar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 7px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #8b949e;
    }

    /* 아코디언 */
    .accordion-item { border-bottom: 1px solid #21262d; }

    .accordion-header {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      cursor: pointer;
      gap: 10px;
      user-select: none;
    }

    .accordion-header:hover { background: #161b22; }
    .accordion-header.open-header { background: #161b22; }

    .accordion-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #00C896;
      flex-shrink: 0;
      width: 14px;
    }

    .accordion-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #00C896;
      border: 1px solid #00C896;
      padding: 1px 5px;
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    .accordion-title {
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
      flex: 1;
      line-height: 1.4;
    }

    .accordion-title a {
      color: inherit;
      text-decoration: none;
    }

    .accordion-title a:hover { color: #00C896; }

    /* 책갈피 버튼 */
    .bookmark-btn {
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px 6px;
      display: flex;
      align-items: center;
    }

    .bookmark-btn svg {
      width: 14px;
      height: 18px;
      fill: none;
      stroke: #30363d;
      stroke-width: 1.5;
      transition: stroke 0.15s, fill 0.15s;
    }

    .bookmark-btn.saved svg {
      fill: #00C896;
      stroke: #00C896;
    }

    .bookmark-btn:hover svg { stroke: #00C896; }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      padding: 14px 16px 16px 40px;
      font-size: 13px;
      color: #333;
      line-height: 1.8;
      border-top: 1px solid #21262d;
      background: #ffffff;
    }

    .accordion-body.open {
      max-height: 800px;
      opacity: 1;
    }

    /* MY PAGE */
    .mypage-empty {
      padding: 48px 16px;
      text-align: center;
    }

    .mypage-empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .mypage-empty-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.8;
    }

    .mypage-item { border-bottom: 1px solid #21262d; }

    .mypage-item-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }

    .mypage-item-header:hover { background: #161b22; }
    .mypage-item-header.open-header { background: #161b22; }

    .mypage-item-body {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      padding: 14px 16px 16px 40px;
      font-size: 13px;
      color: #333;
      line-height: 1.8;
      border-top: 1px solid #21262d;
      background: #ffffff;
    }

    .mypage-item-body.open {
      max-height: 800px;
      opacity: 1;
    }

    .mypage-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #00C896;
      flex-shrink: 0;
      width: 14px;
      padding-top: 2px;
    }

    .mypage-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: #8b949e;
      flex-shrink: 0;
      padding-top: 2px;
      min-width: 58px;
    }

    .mypage-title {
      font-size: 13px;
      color: #c9d1d9;
      line-height: 1.5;
      flex: 1;
    }

    .mypage-bookmark {
      flex-shrink: 0;
      padding-top: 2px;
    }

    .mypage-bookmark svg {
      width: 12px;
      height: 16px;
      fill: #00C896;
      stroke: #00C896;
      stroke-width: 1.5;
    }

    .mypage-count-bar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 7px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #8b949e;
    }

    /* 날짜 선택 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: flex-end;
      z-index: 200;
    }

    .modal-sheet {
      background: #161b22;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border-top: 1px solid #30363d;
      max-height: 70vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #30363d;
      font-size: 14px;
      font-weight: 700;
      color: #e6edf3;
      position: sticky;
      top: 0;
      background: #161b22;
    }

    .modal-close {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
    }

    .date-list { list-style: none; }

    .date-list li {
      padding: 13px 16px;
      font-size: 13px;
      color: #c9d1d9;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .date-list li:hover { background: #0D1117; }
    .date-list li.today { color: #e6edf3; font-weight: 700; }

    .today-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      border: 1px solid #00C896;
      color: #00C896;
      padding: 2px 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-eyebrow">KOREA MARKET</div>
      <div class="header-title">한경 모닝루틴</div>
      <div class="header-date" id="header-date">로딩 중...</div>
    </div>
    <button class="date-btn" onclick="openDateModal()">날짜 선택 ▼</button>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('news')">NEWS</div>
    <div class="tab" onclick="switchTab('mypage')">MY PAGE</div>
  </div>

  <!-- NEWS 탭 -->
  <div class="tab-content active" id="tab-news">

    <a href="#" target="_blank" class="thumbnail" id="thumbnail-link">
      <img id="thumbnail-img" src="" alt=""
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <div class="thumbnail-inner">
        <div class="play-btn"><div class="play-icon"></div></div>
      </div>
    </a>

    <div class="news-count-bar" id="news-count-bar">로딩 중...</div>
    <div id="news-items"></div>

  </div>

  <!-- MY PAGE 탭 -->
  <div class="tab-content" id="tab-mypage">
    <div class="mypage-count-bar" id="mypage-count">SAVED 0 ITEMS</div>
    <div id="mypage-list">
      <div class="mypage-empty">
        <div class="mypage-empty-icon">🔖</div>
        <div class="mypage-empty-text">저장된 뉴스가 없습니다.<br>NEWS 탭에서 책갈피를 추가해보세요.</div>
      </div>
    </div>
  </div>

  <!-- 날짜 선택 모달 -->
  <div class="modal-overlay" id="date-modal" style="display:none;" onclick="closeDateModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-header">
        날짜 선택
        <button class="modal-close" onclick="closeDateModal()">✕ 닫기</button>
      </div>
      <ul class="date-list" id="date-list">
        <li style="color:#8b949e;">로딩 중...</li>
      </ul>
    </div>
  </div>

  <script>
    const WEEK = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    const STORAGE_KEY = 'hankyung_bookmarks';

    function loadFromStorage() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch { return {}; }
    }
    function saveToStorage(bm) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bm));
    }
    const bookmarks = loadFromStorage();

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
    }

    // ── 데이터 로드 ───────────────────────────────────────
    async function init() {
      try {
        const res = await fetch(`data/index.json?t=${Date.now()}`);
        if (!res.ok) throw new Error('index.json 없음');
        const dates = await res.json();
        renderDateList(dates);
        if (dates.length > 0) await loadDate(dates[0]);
      } catch(e) {
        document.getElementById('news-count-bar').textContent = '데이터를 불러올 수 없습니다.';
        console.error(e);
      }
    }

    async function loadDate(dateStr) {
      const res = await fetch(`data/${dateStr}.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(`${dateStr}.json 없음`);
      const data = await res.json();
      renderPage(data);
    }

    function renderPage(data) {
      document.getElementById('header-date').textContent = data.date_display;

      const thumbLink = document.getElementById('thumbnail-link');
      if (data.video_id) {
        thumbLink.style.display = '';
        thumbLink.href = `https://www.youtube.com/watch?v=${data.video_id}`;
        const img = document.getElementById('thumbnail-img');
        img.src = `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg`;
        img.alt = data.video_title;
      } else {
        thumbLink.style.display = 'none';
      }

      document.getElementById('news-count-bar').textContent =
        `TOTAL ${data.items.length} ITEMS — 항목을 탭하면 상세 내용이 펼쳐집니다`;

      document.getElementById('news-items').innerHTML = data.items.map((item, i) => `
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggle(this)">
            <span class="accordion-toggle">▶</span>
            <span class="accordion-num">${String(i + 1).padStart(2, '0')}</span>
            <span class="accordion-title">
              ${item.url
                ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(item.title)}</a>`
                : escapeHtml(item.title)}
            </span>
            <button class="bookmark-btn" data-title="${escapeHtml(item.title)}" onclick="toggleBookmark(event, this)">
              <svg viewBox="0 0 14 18"><path d="M1 1h12v16l-6-3-6 3V1z"/></svg>
            </button>
          </div>
          <div class="accordion-body">${item.content}</div>
        </div>`).join('');

      document.querySelectorAll('.bookmark-btn').forEach(btn => {
        if (bookmarks[btn.dataset.title]) btn.classList.add('saved');
      });
    }

    function renderDateList(dates) {
      const weekdays = dates.filter(d => {
        const dateObj = new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T00:00:00+09:00`);
        const day = dateObj.getDay();
        return day !== 0 && day !== 6; // 토·일 제외
      });
      document.getElementById('date-list').innerHTML = weekdays.map((d, i) => {
        const y = d.slice(0, 4), m = d.slice(4, 6), day = d.slice(6, 8);
        const dateObj = new Date(`${y}-${m}-${day}T00:00:00+09:00`);
        const label = `${y}-${m}-${day} ${WEEK[dateObj.getDay()]}`;
        return `<li class="${i === 0 ? 'today' : ''}" onclick="selectDate('${d}')">
          ${label}
          ${i === 0 ? '<span class="today-badge">TODAY</span>' : ''}
        </li>`;
      }).join('');
    }

    window.selectDate = async function(dateStr) {
      closeDateModal();
      document.querySelectorAll('.accordion-body.open').forEach(b => {
        b.classList.remove('open');
        const h = b.previousElementSibling;
        h.querySelector('.accordion-toggle').textContent = '▶';
        h.classList.remove('open-header');
      });
      await loadDate(dateStr);
    };

    // ── 날짜 모달 ─────────────────────────────────────────
    window.openDateModal = function() {
      document.getElementById('date-modal').style.display = 'flex';
    };

    window.closeDateModal = function(event) {
      if (!event || event.target === document.getElementById('date-modal')) {
        document.getElementById('date-modal').style.display = 'none';
      }
    };

    // ── 탭 전환 ───────────────────────────────────────────
    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'news') || (i === 1 && tab === 'mypage'));
      });
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
    };

    // ── 아코디언 ──────────────────────────────────────────
    window.toggle = function(header) {
      const body   = header.nextElementSibling;
      const isOpen = body.classList.contains('open');

      document.querySelectorAll('.accordion-body.open').forEach(b => {
        b.classList.remove('open');
        const h = b.previousElementSibling;
        h.querySelector('.accordion-toggle').textContent = '▶';
        h.classList.remove('open-header');
      });

      if (!isOpen) {
        body.classList.add('open');
        header.querySelector('.accordion-toggle').textContent = '▼';
        header.classList.add('open-header');
      }
    };

    // ── MY PAGE 렌더링 ────────────────────────────────────
    function renderMyPage() {
      const saved = Object.entries(bookmarks);
      const list  = document.getElementById('mypage-list');
      const count = document.getElementById('mypage-count');
      count.textContent = `SAVED ${saved.length} ITEMS`;

      if (saved.length === 0) {
        list.innerHTML = `
          <div class="mypage-empty">
            <div class="mypage-empty-icon">🔖</div>
            <div class="mypage-empty-text">저장된 뉴스가 없습니다.<br>NEWS 탭에서 책갈피를 추가해보세요.</div>
          </div>`;
        return;
      }

      list.innerHTML = saved.map(([title, { content, news_date }]) => `
        <div class="mypage-item">
          <div class="mypage-item-header" onclick="toggleMypageItem(this)">
            <span class="mypage-toggle">▶</span>
            <span class="mypage-date">${news_date}</span>
            <span class="mypage-title">${escapeHtml(title)}</span>
            <span class="mypage-bookmark">
              <svg viewBox="0 0 14 18"><path d="M1 1h12v16l-6-3-6 3V1z"/></svg>
            </span>
          </div>
          <div class="mypage-item-body">${content}</div>
        </div>`).join('');
    }

    window.toggleMypageItem = function(header) {
      const body   = header.nextElementSibling;
      const toggle = header.querySelector('.mypage-toggle');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      toggle.textContent = isOpen ? '▶' : '▼';
      header.classList.toggle('open-header', !isOpen);
    };

    // ── 책갈피 토글 ───────────────────────────────────────
    window.toggleBookmark = function(event, btn) {
      event.stopPropagation();
      const title   = btn.dataset.title;
      const isSaved = btn.classList.toggle('saved');

      if (isSaved) {
        const body    = btn.closest('.accordion-item').querySelector('.accordion-body');
        const content = body ? body.innerHTML.trim() : '';
        const today   = new Date().toISOString().slice(5, 10);
        bookmarks[title] = { content, news_date: today };
      } else {
        delete bookmarks[title];
      }

      saveToStorage(bookmarks);
      renderMyPage();
    };

    renderMyPage();
    init();
  </script>

</body>
</html>
